name: Keep Supabase alive

# Ping quotidien pour eviter la mise en veille du projet Supabase gratuit.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            "https://oefwhcilneuiapnsrnih.supabase.co/rest/v1/note_stats?select=character_id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
